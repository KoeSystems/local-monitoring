global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
    relabel_configs:
      - target_label: instance
        replacement: localhost

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
    relabel_configs:
      - target_label: instance
        replacement: localhost

  - job_name: nvidia_smi_exporter
    static_configs:
      - targets:
          - nvidia_smi_exporter:9835
    relabel_configs:
      - target_label: instance
        replacement: localhost

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets:
          - grafana:3000
    relabel_configs:
      - target_label: instance
        replacement: localhost
