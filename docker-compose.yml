services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: localhost
    user: "0:0"
    ports:
      - "9090:9090"
    volumes:
      - /opt/local-monitoring/prometheus/etc/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/local-monitoring/prometheus/data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    restart: unless-stopped
    networks:
      - monitoring

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node-exporter
    hostname: localhost
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev/data:/run/udev/data:ro
      - /run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --collector.processes
      - --collector.interrupts
    restart: unless-stopped
    networks:
      - monitoring

  nvidia_smi_exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.4.1
    container_name: nvidia_smi_exporter
    hostname: localhost
    restart: unless-stopped
    ports:
      - "9835:9835"
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
    volumes:
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: localhost
    user: "0:0"
    ports:
      - "3000:3000"
    volumes:
      - /opt/local-monitoring/grafana/etc/grafana.ini:/etc/grafana/grafana.ini:ro
      - /opt/local-monitoring/grafana/provisioning:/etc/grafana/provisioning
      - /opt/local-monitoring/grafana/data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
